    <filter id="shadow" x="355" y="118" width="511" height="445" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="16" flood-color="#3B5A84" flood-opacity="0.24"/>
    </filter>
  </defs>

  <rect width="936" height="678" fill="url(#bg)"/>

  <g opacity="0.34" filter="url(#blur)">
    <rect x="88" y="66" width="510" height="130" rx="16" fill="#9BAFD2"/>
    <rect x="113" y="515" width="540" height="90" rx="14" fill="#A0B5D8"/>
  </g>

  <g>
    <rect x="101" y="93" width="371" height="65" rx="10" fill="url(#error)"/>
    <text x="172" y="136" font-family="Inter, Arial, sans-serif" font-size="53" font-weight="700" fill="white">404 Not Found</text>

    <rect x="125" y="192" width="329" height="68" rx="9" fill="url(#warn)"/>
    <text x="193" y="238" font-family="Inter, Arial, sans-serif" font-size="49" font-weight="600" fill="#293240">No Stock</text>

