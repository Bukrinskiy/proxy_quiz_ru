<svg width="936" height="678" viewBox="0 0 936 678" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="468" y1="0" x2="468" y2="678" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F6F7FB"/>
      <stop offset="1" stop-color="#EAF1FC"/>
    </linearGradient>
    <linearGradient id="error" x1="101" y1="125" x2="472" y2="125" gradientUnits="userSpaceOnUse">
      <stop stop-color="#CD293A"/>
      <stop offset="1" stop-color="#F15052"/>
    </linearGradient>
    <linearGradient id="warn" x1="125" y1="226" x2="454" y2="226" gradientUnits="userSpaceOnUse">
      <stop stop-color="#EDEAE1"/>
      <stop offset="1" stop-color="#FFFFFF"/>
    </linearGradient>
    <linearGradient id="fail" x1="92" y1="320" x2="448" y2="320" gradientUnits="userSpaceOnUse">
      <stop stop-color="#CC2A3C"/>
      <stop offset="1" stop-color="#F04B4F"/>
    </linearGradient>
    <linearGradient id="light" x1="130" y1="414" x2="461" y2="414" gradientUnits="userSpaceOnUse">
