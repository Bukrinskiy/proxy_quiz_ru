  </g>

  <g filter="url(#shadow)">
    <rect x="391" y="146" width="439" height="381" rx="16" fill="url(#light)" stroke="#D5DEED"/>
    <rect x="391" y="146" width="439" height="36" rx="16" fill="#F6F7FA"/>
    <circle cx="413" cy="164" r="8" fill="#ED5E5F"/>
    <circle cx="438" cy="164" r="8" fill="#F3BE4D"/>
    <circle cx="463" cy="164" r="8" fill="#5BC766"/>

    <g font-family="Inter, Arial, sans-serif" font-size="22" fill="#1C3555">
      <text x="434" y="230">✓ Гео: <tspan font-weight="800">Казахстан</tspan></text>
      <line x1="418" y1="245" x2="794" y2="245" stroke="#D7DFEE"/>
      <text x="434" y="279">✓ Тип: <tspan font-weight="800">Mobile</tspan></text>
      <line x1="418" y1="294" x2="794" y2="294" stroke="#D7DFEE"/>
      <text x="434" y="328">✓ Оплата: <tspan font-weight="800">Crypto</tspan></text>
      <line x1="418" y1="343" x2="794" y2="343" stroke="#D7DFEE"/>
      <text x="434" y="377">✓ Цена: <tspan font-weight="800">от $15</tspan></text>
      <line x1="418" y1="392" x2="794" y2="392" stroke="#D7DFEE"/>
      <text x="434" y="426">✓ Промокод: <tspan font-weight="800">SAVE15</tspan></text>
      <line x1="418" y1="441" x2="794" y2="441" stroke="#D7DFEE"/>
